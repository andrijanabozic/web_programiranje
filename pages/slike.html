<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Galerija</title>
    <link rel="stylesheet" href="../styles/style_slike.css">
</head>
<body>
    <section class="galerija"> 
        <h1>Galerija slika</h1>

        <div class="img-gallery-magnific"> <!-- DODANO: Omotač iz tvog CSS-a -->
            <figure class="galerija_slika">
                <a href="#img1"> <!-- DODANO: Poveznica za Lightbox id -->
                  <img src="https://comicbook.com/wp-content/uploads/sites/4/2024/01/b4128fa5-f913-4488-a232-831ef851baaf.jpg" alt="Slika 1" loading="lazy">
                </a>
                <figcaption>Slika 1</figcaption>
            </figure>
            
            <figure class="galerija_slika">
                <a href="#img2">
                  <img src="https://static.wixstatic.com/media/f68628_6c6b7bf38b2c4586944aa26baf79d333~mv2.jpeg/v1/fill/w_672,h_378,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/f68628_6c6b7bf38b2c4586944aa26baf79d333~mv2.jpeg" alt="Slika 2" loading="lazy">
                </a>
                <figcaption>Slika 2</figcaption>
            </figure>
            
            <!-- PONOVITI ISTO ZA SVE SLIKE DO 16... -->
            <!-- Primjer za zadnju: -->
            <figure class="galerija_slika">
                <a href="#img16">
                  <img src="https://upload.wikimedia.org/wikipedia/ru/archive/8/83/20230805080444%21Dark_knight_rises_poster.jpg" alt="Slika 16" loading="lazy">
                </a>
                <figcaption>Slika 3</figcaption>
            </figure>
        </div>
    </section>

    <!-- DODANO: Lightbox elementi za svaku sliku (zahtjev 2.3) -->
    <!-- Primjer za prvu sliku (trebaš kopirati za svaku sliku mijenjajući id) -->
    <div id="img1" class="lightbox">
        <a href="#" class="close">&times;</a>
        <img src="https://unsplash.it" alt="Uvećana slika 1">
    </div>
    
    <div id="img2" class="lightbox">
        <a href="#" class="close">&times;</a>
        <img src="https://unsplash.it" alt="Uvećana slika 2">
    </div>
    <!-- ... i tako dalje do img16 -->

</body>
</html>
